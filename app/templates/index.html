<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Virtual Dart Motion</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

  <div class="header">

    <h1>Virtual Dart Motion</h1>

    <p>AI Motion Based Dart Game</p>

  </div>

  <div class="dashboard">

    <!-- LEFT -->
    <div>

      <div class="panel">

        <h2>System Status</h2>

        <input
          type="text"
          id="player1Name"
          placeholder="PLAYER 1 NAME">

        <input
          type="text"
          id="player2Name"
          placeholder="PLAYER 2 NAME">

        <div class="upload-box">

          <form id="uploadForm">

            <button
              type="submit"
              id="startButton">

              START ANALYSIS

            </button>

          </form>

          <div id="loading"></div>

        </div>

        <button
          class="reset-button"
          onclick="resetGame()">

          RESET GAME

        </button>

        <div class="result-box">

          <h3>Analysis Status</h3>

          <p id="statusText">

            READY

          </p>

        </div>

        <div class="result-box">

          <h3>Latest Video</h3>

          <p id="videoText">

            WAITING

          </p>

        </div>

        <div class="result-box">

          <h3>Last Throw Result</h3>

          <p id="hitText">

            NO DATA

          </p>

        </div>

      </div>

    </div>

    <!-- CENTER -->
    <div>

      <div class="panel">

        <h2>Smart Target Board</h2>

        <div class="board" id="board">

        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div>

      <div class="panel">

        <h2>Game Status</h2>

        <div class="player-box">

          <p>현재 플레이어</p>

          <h3
            class="turn"
            id="currentPlayerText">

            PLAYER 1

          </h3>

        </div>

        <div class="player-box">

          <p>현재 ROUND</p>

          <h3
            class="turn"
            id="roundText">

            ROUND 1 / 3

          </h3>

        </div>

        <div class="player-box">

          <p>현재 점수</p>

          <div class="score">

            <div>

              <span id="p1Label">P1</span> :
              <span id="player1Score">0</span>

            </div>

            <div>

              <span id="p2Label">P2</span> :
              <span id="player2Score">0</span>

            </div>

          </div>

        </div>

        <div class="player-box">

          <p>WINNER</p>

          <h3
            class="turn"
            id="winnerText">

            -

          </h3>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

let currentPlayer = 1;

let currentRound = 1;

const MAX_ROUND = 3;

let gameEnded = false;

let playerScores = {
  1: 0,
  2: 0
};

const board =
  document.getElementById("board");

const BOARD_SIZE = 5;

function createBoard() {

  board.innerHTML = "";

  for (let y = 0; y < BOARD_SIZE; y++) {

    for (let x = 0; x < BOARD_SIZE; x++) {

      const cell =
        document.createElement("div");

      cell.classList.add("cell");

      if (x === 2 && y === 2) {

        cell.classList.add("red");

      }
      else if (
        Math.abs(x - 2) <= 1 &&
        Math.abs(y - 2) <= 1
      ) {

        cell.classList.add("yellow");

      }
      else {

        cell.classList.add("green");

      }

      cell.dataset.x = x;
      cell.dataset.y = y;

      board.appendChild(cell);

    }

  }

}

function clearBoardHighlight() {

  const cells =
    document.querySelectorAll(".cell");

  cells.forEach(cell => {

    cell.classList.remove("active");

  });

}

function activateBoardCell(hitX, hitY) {

  clearBoardHighlight();

  const boardX =
    Math.floor(hitX / 16 * BOARD_SIZE);

  const boardY =
    Math.floor(hitY / 16 * BOARD_SIZE);

  const cells =
    document.querySelectorAll(".cell");

  cells.forEach(cell => {

    const x =
      parseInt(cell.dataset.x);

    const y =
      parseInt(cell.dataset.y);

    if (x === boardX && y === boardY) {

      cell.classList.add("active");

    }

  });

}

function showScorePopup(score) {

  const popup =
    document.createElement("div");

  popup.classList.add("score-popup");

  popup.innerText =
    `+${score}`;

  popup.style.left =
    `${window.innerWidth / 2}px`;

  popup.style.top =
    `${window.innerHeight / 2}px`;

  document.body.appendChild(popup);

  setTimeout(() => {

    popup.remove();

  }, 1000);

}

function finishGame() {

  gameEnded = true;

  let winner = "DRAW";

  if (playerScores[1] > playerScores[2]) {

    winner =
      document.getElementById("p1Label").innerText;

  }
  else if (playerScores[2] > playerScores[1]) {

    winner =
      document.getElementById("p2Label").innerText;

  }

  const winnerText =
    document.getElementById("winnerText");

  winnerText.innerText =
    winner;

  winnerText.classList.add("game-over");

  document.getElementById("statusText").innerText =
    "GAME OVER";

}

function resetGame() {

  currentPlayer = 1;

  currentRound = 1;

  gameEnded = false;

  playerScores = {
    1: 0,
    2: 0
  };

  document.getElementById("player1Score").innerText = 0;

  document.getElementById("player2Score").innerText = 0;

  document.getElementById("winnerText").innerText = "-";

  document.getElementById("winnerText")
    .classList.remove("game-over");

  document.getElementById("currentPlayerText").innerText =
    document.getElementById("p1Label").innerText;

  document.getElementById("roundText").innerText =
    "ROUND 1 / 3";

  document.getElementById("statusText").innerText =
    "READY";

  document.getElementById("hitText").innerText =
    "NO DATA";

  document.getElementById("videoText").innerText =
    "WAITING";

  document.getElementById("loading").innerText =
    "";

  clearBoardHighlight();

}

createBoard();

const form =
  document.getElementById("uploadForm");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  if (gameEnded) {

    alert("게임이 종료되었습니다.");

    return;

  }

  const startButton =
    document.getElementById("startButton");

  startButton.disabled = true;

  startButton.innerText =
    "ANALYZING...";

  const p1 =
    document.getElementById("player1Name").value;

  const p2 =
    document.getElementById("player2Name").value;

  if (p1) {

    document.getElementById("p1Label").innerText =
      p1;

  }

  if (p2) {

    document.getElementById("p2Label").innerText =
      p2;

  }

  document.getElementById("loading").innerText =
    "ADB CAMERA RECORDING...";

  document.getElementById("statusText").innerText =
    "CAPTURING VIDEO";

  try {

    const response =
      await fetch("/analyze", {

        method: "POST"

      });

    const data =
      await response.json();

    if (!data.success) {

      document.getElementById("statusText").innerText =
        "ERROR";

      document.getElementById("loading").innerText =
        data.error;

      startButton.disabled = false;

      startButton.innerText =
        "START ANALYSIS";

      return;

    }

    document.getElementById("loading").innerText =
      "AI ANALYZING MOTION...";

    document.getElementById("statusText").innerText =
      "PROCESSING";

    document.getElementById("videoText").innerText =
      data.video_name;

    activateBoardCell(
      data.hit_x,
      data.hit_y
    );

    const score =
      Math.max(
        0,
        100 - (
          Math.abs(data.hit_x - 7) +
          Math.abs(data.hit_y - 7)
        ) * 10
      );

    showScorePopup(score);

    playerScores[currentPlayer] += score;

    document.getElementById("player1Score").innerText =
      playerScores[1];

    document.getElementById("player2Score").innerText =
      playerScores[2];

    document.getElementById("hitText").innerText =
      `HIT POSITION : (${data.hit_x}, ${data.hit_y})`;

    document.getElementById("statusText").innerText =
      "BOARD UPDATED";

    document.getElementById("loading").innerText =
      "ANALYSIS COMPLETE";

    if (currentPlayer === 1) {

      currentPlayer = 2;

    }
    else {

      currentPlayer = 1;

      currentRound++;

      document.getElementById("roundText").innerText =
        `ROUND ${currentRound} / ${MAX_ROUND}`;

    }

    const currentPlayerText =
      document.getElementById("currentPlayerText");

    currentPlayerText.classList.remove("turn-active");

    void currentPlayerText.offsetWidth;

    currentPlayerText.classList.add("turn-active");

    if (currentPlayer === 1) {

      currentPlayerText.innerText =
        document.getElementById("p1Label").innerText;

    }
    else {

      currentPlayerText.innerText =
        document.getElementById("p2Label").innerText;

    }

    if (currentRound > MAX_ROUND) {

      finishGame();

    }

  }
  catch (error) {

    console.error(error);

    document.getElementById("statusText").innerText =
      "SERVER ERROR";

    document.getElementById("loading").innerText =
      "FAILED";

  }

  startButton.disabled = false;

  startButton.innerText =
    "START ANALYSIS";

});

</script>

</body>
</html>
